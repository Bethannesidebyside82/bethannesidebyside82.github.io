name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          A811F5: ${{ secrets.A811F5 }}
          B749A6: ${{ secrets.B749A6 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A811F5', '')
          bm = os.environ.get('B749A6', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s
              if gm:
                  s2 = s2.replace('<!-- fca54279314e7c39f3793d0d488d1bb562f1fefe -->', gm)
              if bm:
                  s2 = s2.replace('<!-- 6263e02e3bbd49b9fa9dd6f0370f1d77c5f1760f0c -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0 and (gm or bm):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
